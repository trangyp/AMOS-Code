# AMOS Brain - Production with SSL/HTTPS
# Use this for production deployment with Let's Encrypt

version: '3.8'

services:
  # Nginx with SSL
  nginx:
    image: nginx:alpine
    container_name: nginx-ssl
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - amos-api
      - amos-websocket
      - admin-dashboard
    networks:
      - amos-network
    restart: unless-stopped

  # Certbot for SSL certificate automation
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
    networks:
      - amos-network

  # API Server
  amos-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: amos-brain:latest
    container_name: amos-api
    expose:
      - "5000"
    environment:
      - PYTHONUNBUFFERED=1
      - AMOS_BRAIN_PATH=/app/_AMOS_BRAIN
      - PORT=5000
    env_file:
      - .env
    volumes:
      - amos-memory:/app/memory
      - amos-logs:/app/logs
      - ./data:/app/data
    networks:
      - amos-network
    restart: unless-stopped

  # WebSocket Server
  amos-websocket:
    build:
      context: .
      dockerfile: Dockerfile
    image: amos-brain:latest
    container_name: amos-websocket
    command: ["python3", "websocket_server.py"]
    expose:
      - "8765"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - amos-memory:/app/memory
    networks:
      - amos-network
    restart: unless-stopped

  # Admin Dashboard
  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: admin-dashboard
    expose:
      - "80"
    networks:
      - amos-network
    restart: unless-stopped

volumes:
  amos-memory:
    driver: local
  amos-logs:
    driver: local
  certbot-data:
    driver: local
  certbot-www:
    driver: local

networks:
  amos-network:
    driver: bridge
