# Default values for amos-gateway
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Replica count
replicaCount: 3

# -- Docker image configuration
image:
  repository: ghcr.io/amos/amos-fastapi-gateway
  pullPolicy: Always
  tag: "latest"

# -- Image pull secrets
imagePullSecrets: []

# -- Name override
nameOverride: ""

# -- Full name override
fullnameOverride: ""

# -- Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# -- Pod annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# -- Security context for containers
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# -- Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# -- Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: amos.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: amos-tls
  #    hosts:
  #      - amos.local

# -- Resource requests and limits
resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

# -- Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity configuration
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - amos-gateway
          topologyKey: kubernetes.io/hostname

# -- Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# -- Probes configuration
probes:
  liveness:
    path: /health
    port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /health
    port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    path: /health
    port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30

# -- Environment variables
env:
  APP_NAME: "AMOS FastAPI Gateway"
  APP_VERSION: "1.0.0"
  ENVIRONMENT: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  RUNTIME_ENABLED: "true"
  BOOTSTRAP_ON_START: "true"
  SELF_HEALING_ENABLED: "true"
  HEALTH_CHECK_INTERVAL: "30"
  WORKERS: "4"

# -- Secrets (reference to existing secrets)
secrets:
  name: amos-secrets
  keys:
    - secret-key

# -- ConfigMap configuration
configMap:
  name: amos-config
  data:
    redis.url: "redis://redis:6379/0"

# -- Network Policy
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: amos-production
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379

# -- Redis dependency configuration
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 8Gi
