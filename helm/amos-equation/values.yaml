# Default values for amos-equation
# This is a YAML-formatted file.

# ======================
# Image Configuration
# ======================
image:
  repository: amos/equation-api
  pullPolicy: IfNotPresent
  tag: "13.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ======================
# Deployment Configuration
# ======================
replicaCount: 3

deployment:
  annotations: {}
  labels: {}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# ======================
# Pod Configuration
# ======================
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsUser: 1000
  runAsGroup: 1000

# ======================
# Service Configuration
# ======================
service:
  type: ClusterIP
  port: 80
  targetPort: 8000
  annotations: {}

# ======================
# Ingress Configuration
# ======================
ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.amos.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: amos-equation-tls
      hosts:
        - api.amos.local

# ======================
# Resources
# ======================
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# ======================
# Autoscaling (HPA)
# ======================
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30

# ======================
# Probes
# ======================
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

startupProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

# ======================
# Environment Variables
# ======================
env:
  - name: LOG_LEVEL
    value: "info"
  - name: WORKERS
    value: "4"
  - name: REDIS_ENABLED
    value: "true"
  - name: REDIS_HOST
    value: "amos-equation-redis-master"
  - name: REDIS_PORT
    value: "6379"
  - name: ENABLE_SYMBOLIC
    value: "true"
  - name: MAX_EQUATIONS_PER_REQUEST
    value: "100"

# ======================
# Secrets (External)
# ======================
envFromSecrets: []
  # - name: api-secrets
  #   key: REDIS_PASSWORD

# ======================
# Persistence
# ======================
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /data

# ======================
# Configuration
# ======================
config:
  equations:
    enabled:
      - machine_learning
      - physics
      - information_theory
      - control_theory
      - systems
      - signal_processing
    cache_ttl: 3600
  api:
    rate_limit: 1000
    rate_window: 3600
    cors_origins:
      - "*"
  monitoring:
    enabled: true
    metrics_port: 8000

# ======================
# Service Account
# ======================
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ======================
# RBAC
# ======================
rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["configmaps"]
      verbs: ["get", "list"]

# ======================
# Network Policy
# ======================
networkPolicy:
  enabled: true
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: amos-equation
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: amos-equation-redis
      ports:
        - protocol: TCP
          port: 6379

# ======================
# Pod Disruption Budget
# ======================
pdb:
  enabled: true
  minAvailable: 2

# ======================
# Redis Dependency
# ======================
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

# ======================
# Monitoring
# ======================
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  namespace: monitoring
  labels:
    release: prometheus

# ======================
# Node Selection
# ======================
nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - amos-equation
          topologyKey: kubernetes.io/hostname

# ======================
# Pod Topology Spread
# ======================
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: amos-equation

# ======================
# Extra Objects
# ======================
extraDeploy: []
