<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMOS Dashboard</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 {
            color: #00d4aa;
            border-bottom: 2px solid #00d4aa;
            padding-bottom: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #0f3460;
        }
        .card h2 {
            margin-top: 0;
            color: #e94560;
            font-size: 1.2em;
        }
        button {
            background: #00d4aa;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px 5px 5px 0;
        }
        button:hover {
            background: #00b894;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            background: #1a1a2e;
            color: #eee;
            margin: 10px 0;
        }
        pre {
            background: #0f3460;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
            max-height: 300px;
            margin-top: 10px;
        }
        .status-ok { color: #00d4aa; }
        .status-error { color: #e94560; }
        .endpoint {
            font-family: monospace;
            background: #0f3460;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>🧠 AMOS Cognitive System Dashboard</h1>
    <p>API Base URL: <span class="endpoint">http://localhost:8765</span></p>

    <div class="grid">
        <div class="card">
            <h2>System Status</h2>
            <button onclick="checkHealth()">Check Health</button>
            <button onclick="checkStatus()">Full Status</button>
            <pre id="status-result">Click a button to check system status...</pre>
        </div>

        <div class="card">
            <h2>Brain Cognition</h2>
            <input type="text" id="thought-input" placeholder="Enter something to think about...">
            <button onclick="think()">POST /brain/think</button>
            <button onclick="plan()">POST /brain/plan</button>
            <pre id="brain-result">...</pre>
        </div>

        <div class="card">
            <h2>Agents</h2>
            <button onclick="listAgents()">GET /agents/list</button>
            <input type="text" id="command-input" placeholder="Enter command to execute...">
            <button onclick="execute()">POST /agents/execute</button>
            <pre id="agent-result">...</pre>
        </div>

        <div class="card">
            <h2>Analysis</h2>
            <input type="text" id="topic-input" placeholder="Enter topic to analyze...">
            <button onclick="analyze()">POST /brain/analyze</button>
            <pre id="analyze-result">...</pre>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8765';

        async function apiCall(endpoint, method = 'GET', body = null) {
            try {
                const options = {
                    method,
                    headers: { 'Content-Type': 'application/json' }
                };
                if (body) options.body = JSON.stringify(body);

                const response = await fetch(API + endpoint, options);
                const data = await response.json();
                return { ok: response.ok, data };
            } catch (error) {
                return { ok: false, error: error.message };
            }
        }

        async function checkHealth() {
            const result = await apiCall('/health');
            const el = document.getElementById('status-result');
            if (result.ok) {
                el.innerHTML = `<span class="status-ok">✓ ${JSON.stringify(result.data, null, 2)}</span>`;
            } else {
                el.innerHTML = `<span class="status-error">✗ Error: ${result.error}</span>`;
            }
        }

        async function checkStatus() {
            const result = await apiCall('/status');
            const el = document.getElementById('status-result');
            if (result.ok) {
                el.textContent = JSON.stringify(result.data, null, 2);
            } else {
                el.innerHTML = `<span class="status-error">✗ Error: ${result.error}</span>`;
            }
        }

        async function think() {
            const content = document.getElementById('thought-input').value || 'Hello AMOS';
            const result = await apiCall('/brain/think', 'POST', { content });
            document.getElementById('brain-result').textContent =
                JSON.stringify(result.data || result.error, null, 2);
        }

        async function plan() {
            const goal = document.getElementById('thought-input').value || 'Create something useful';
            const result = await apiCall('/brain/plan', 'POST', { goal });
            document.getElementById('brain-result').textContent =
                JSON.stringify(result.data || result.error, null, 2);
        }

        async function listAgents() {
            const result = await apiCall('/agents/list');
            document.getElementById('agent-result').textContent =
                JSON.stringify(result.data || result.error, null, 2);
        }

        async function execute() {
            const command = document.getElementById('command-input').value || 'echo "Hello from AMOS"';
            const result = await apiCall('/agents/execute', 'POST', { command });
            document.getElementById('agent-result').textContent =
                JSON.stringify(result.data || result.error, null, 2);
        }

        async function analyze() {
            const topic = document.getElementById('topic-input').value || 'System capabilities';
            const result = await apiCall('/brain/analyze', 'POST', { topic });
            document.getElementById('analyze-result').textContent =
                JSON.stringify(result.data || result.error, null, 2);
        }

        // Auto-check health on load
        checkHealth();
    </script>
</body>
</html>
