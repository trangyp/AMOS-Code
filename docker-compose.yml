# AMOS Brain + ClawSpring Docker Compose
# Full stack with optional services

version: '3.8'

services:
  # AMOS Brain API Server (for neurosyncai.tech)
  amos-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: amos-brain:latest
    container_name: amos-api
    ports:
      - "5000:5000"
      - "8765:8765"  # WebSocket port
    environment:
      - PYTHONUNBUFFERED=1
      - AMOS_BRAIN_PATH=/app/_AMOS_BRAIN
      - PORT=5000
    env_file:
      - .env
    volumes:
      - amos-memory:/app/memory
      - amos-logs:/app/logs
    networks:
      - amos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MCP Server (optional - for external IDE integration)
  amos-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: amos-brain:latest
    container_name: amos-mcp-server
    command: ["python3", "amos_mcp_server.py", "--transport", "sse", "--port", "8080"]
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - amos-memory:/app/memory
    networks:
      - amos-network
    depends_on:
      amos-brain:
        condition: service_healthy

  # CLI Interface (interactive mode)
  amos-cli:
    build:
      context: .
      dockerfile: Dockerfile
    image: amos-brain:latest
    container_name: amos-cli
    stdin_open: true
    tty: true
    command: ["bash"]
    volumes:
      - amos-memory:/app/memory
      - amos-logs:/app/logs
      - ./:/app/workspace
    networks:
      - amos-network
    depends_on:
      amos-brain:
        condition: service_healthy

  # WebSocket Server for real-time streaming
  amos-websocket:
    build:
      context: .
      dockerfile: Dockerfile
    image: amos-brain:latest
    container_name: amos-websocket
    command: ["python3", "websocket_server.py"]
    ports:
      - "8765:8765"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - amos-memory:/app/memory
    networks:
      - amos-network
    restart: unless-stopped

  # Admin Dashboard
  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: admin-dashboard
    ports:
      - "8080:80"
    networks:
      - amos-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - amos-api
      - amos-websocket
      - admin-dashboard
    networks:
      - amos-network
    restart: unless-stopped

volumes:
  amos-memory:
    driver: local
  amos-logs:
    driver: local

networks:
  amos-network:
    driver: bridge
