# AMOS v3.0.0 - Full Stack Docker Compose
# React Dashboard + FastAPI Backend
# 
# Creator: Trang Phan
# Quick Start: docker-compose up -d

version: '3.8'

services:
  # AMOS Dashboard - React Frontend
  amos-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: amos-dashboard:latest
    container_name: amos-dashboard
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=http://localhost:8000
    networks:
      - amos-network
    restart: unless-stopped
    depends_on:
      amos-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # AMOS Backend - FastAPI API
  amos-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: amos-backend:latest
    container_name: amos-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    networks:
      - amos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Add more services as needed
  # - Database (PostgreSQL)
  # - Cache (Redis)
  # - Queue (RabbitMQ)

volumes:
  amos-memory:
    driver: local
  amos-logs:
    driver: local

networks:
  amos-network:
    driver: bridge
