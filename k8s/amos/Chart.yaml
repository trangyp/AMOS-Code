apiVersion: v2
name: amos
description: AMOS Cognitive Operating System - Hybrid Neural-Symbolic AI Platform
type: application
version: 2.8.0
appVersion: "2.8.0"
keywords:
  - ai
  - cognitive
  - orchestration
  - agents
  - workflow
  - fastapi
  - graphql
  - kafka
  - postgres
  - redis
home: https://amos.ai
sources:
  - https://github.com/amos/amos
maintainers:
  - name: Trang Phan
    email: trang@amos.ai
    url: https://github.com/trangphan
dependencies:
  - name: postgresql
    version: 13.2.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 18.5.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: kafka
    version: 26.4.0
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
  - name: traefik
    version: 26.0.0
    repository: https://traefik.github.io/charts
    condition: traefik.enabled
annotations:
  category: AI/ML
  license: Apache-2.0
