apiVersion: v1
kind: Secret
metadata:
  name: {{ include "amos.fullname" . }}-db-credentials
  labels:
    {{- include "amos.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ include "amos.database.url" . }}
  username: {{ .Values.postgresql.auth.username }}
  password: {{ .Values.postgresql.auth.password }}
  database: {{ .Values.postgresql.auth.database }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "amos.fullname" . }}-redis-credentials
  labels:
    {{- include "amos.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ include "amos.redis.url" . }}
  password: {{ .Values.redis.auth.password }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "amos.fullname" . }}-jwt-secret
  labels:
    {{- include "amos.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: "{{ randAlphaNum 64 }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "amos.fullname" . }}-grafana-credentials
  labels:
    {{- include "amos.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-user: admin
  admin-password: "{{ randAlphaNum 16 }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "amos.fullname" . }}-api-key
  labels:
    {{- include "amos.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: "{{ randAlphaNum 32 }}"
  internal-token: "{{ randAlphaNum 48 }}"
