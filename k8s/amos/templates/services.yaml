apiVersion: v1
kind: Service
metadata:
  name: {{ include "amos.fullname" . }}-api
  labels:
    {{- include "amos.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "amos.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "amos.fullname" . }}-graphql
  labels:
    {{- include "amos.labels" . | nindent 4 }}
    app.kubernetes.io/component: graphql
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "amos.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: graphql
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "amos.fullname" . }}-websocket
  labels:
    {{- include "amos.labels" . | nindent 4 }}
    app.kubernetes.io/component: websocket
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "amos.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: websocket
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "amos.fullname" . }}-workers
  labels:
    {{- include "amos.labels" . | nindent 4 }}
    app.kubernetes.io/component: workers
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "amos.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: workers
