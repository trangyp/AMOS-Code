# AMOS Redis Deployment
#
# Redis for caching and event bus.
#
# Creator: Trang Phan
# Version: 3.0.0

apiVersion: apps/v1
kind: Deployment
metadata:
  name: amos-redis
  namespace: amos
  labels:
    app.kubernetes.io/name: amos-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/version: "3.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: amos-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amos-redis
        app.kubernetes.io/component: cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: amos-redis
  namespace: amos
  labels:
    app.kubernetes.io/name: amos-redis
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    app.kubernetes.io/name: amos-redis
