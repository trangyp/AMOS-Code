# AMOS Secrets
#
# Sensitive configuration for AMOS services.
#
# IMPORTANT: Replace base64 encoded values with actual secrets!
# echo -n 'your-secret' | base64
#
# Creator: Trang Phan
# Version: 3.0.0

apiVersion: v1
kind: Secret
metadata:
  name: amos-secrets
  namespace: amos
  labels:
    app.kubernetes.io/name: amos
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # JWT Secret Key (CHANGE THIS!)
  # echo -n 'your-super-secret-jwt-key' | base64
  JWT_SECRET_KEY: eW91ci1zdXBlci1zZWNyZXQtand0LWtleQ==

  # Database Password (CHANGE THIS!)
  # echo -n 'amos_password' | base64
  DB_PASSWORD: YW1vc19wYXNzd29yZA==

  # API Docs Credentials (CHANGE THIS!)
  # echo -n 'admin' | base64
  DOCS_USERNAME: YWRtaW4=
  # echo -n 'secure-password' | base64
  DOCS_PASSWORD: c2VjdXJlLXBhc3N3b3Jk

  # Internal API Key (CHANGE THIS!)
  # echo -n 'internal-secret-key' | base64
  INTERNAL_API_KEY: aW50ZXJuYWwtc2VjcmV0LWtleQ==

  # OpenAI API Key (optional)
  # echo -n 'sk-...' | base64
  OPENAI_API_KEY: ""

  # Anthropic API Key (optional)
  # echo -n 'sk-ant-...' | base64
  ANTHROPIC_API_KEY: ""
