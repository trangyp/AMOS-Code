# AMOS Backend Deployment
#
# FastAPI backend with horizontal pod autoscaling.
#
# Creator: Trang Phan
# Version: 3.0.0

apiVersion: apps/v1
kind: Deployment
metadata:
  name: amos-backend
  namespace: amos
  labels:
    app.kubernetes.io/name: amos-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "3.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: amos-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amos-backend
        app.kubernetes.io/component: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/trangphan/amos-backend:3.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: amos-config
        env:
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: amos-secrets
              key: JWT_SECRET_KEY
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: amos-secrets
              key: DB_PASSWORD
        - name: DOCS_USERNAME
          valueFrom:
            secretKeyRef:
              name: amos-secrets
              key: DOCS_USERNAME
        - name: DOCS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: amos-secrets
              key: DOCS_PASSWORD
        - name: INTERNAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: amos-secrets
              key: INTERNAL_API_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: amos-secrets
              key: OPENAI_API_KEY
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: amos-secrets
              key: ANTHROPIC_API_KEY
              optional: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/startup
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - amos-backend
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: amos-backend
  namespace: amos
  labels:
    app.kubernetes.io/name: amos-backend
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: amos-backend
