# AMOS Frontend (Dashboard) Deployment
#
# React frontend served via Nginx.
#
# Creator: Trang Phan
# Version: 3.0.0

apiVersion: apps/v1
kind: Deployment
metadata:
  name: amos-dashboard
  namespace: amos
  labels:
    app.kubernetes.io/name: amos-dashboard
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "3.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: amos-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amos-dashboard
        app.kubernetes.io/component: frontend
    spec:
      containers:
      - name: dashboard
        image: ghcr.io/trangphan/amos-dashboard:3.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        env:
        - name: VITE_API_URL
          value: "http://amos-backend:8000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: amos-dashboard
  namespace: amos
  labels:
    app.kubernetes.io/name: amos-dashboard
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: amos-dashboard
