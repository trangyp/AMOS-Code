# AMOS Kubernetes Kustomization
#
# Base configuration for AMOS deployment.
# Use with: kubectl apply -k .
#
# Creator: Trang Phan
# Version: 3.0.0

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: amos

resources:
- namespace.yaml
- configmap.yaml
- secret.yaml
- postgres-deployment.yaml
- redis-deployment.yaml
- backend-deployment.yaml
- frontend-deployment.yaml
- hpa.yaml
- ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: amos-brain
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/version: "3.0.0"

images:
- name: ghcr.io/trangphan/amos-backend
  newTag: "3.0.0"
- name: ghcr.io/trangphan/amos-dashboard
  newTag: "3.0.0"

# Patches can be added here for environment-specific overrides
