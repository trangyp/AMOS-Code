# AMOS Equation System Kubernetes Deployment
# Production-ready manifests for equation API with monitoring

apiVersion: v1
kind: Namespace
metadata:
  name: amos-equation
  labels:
    name: amos-equation
    version: v2.0.0

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: equation-api-config
  namespace: amos-equation
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  METRICS_ENABLED: "true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: equation-api
  namespace: amos-equation
  labels:
    app: equation-api
    version: v2.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: equation-api
  template:
    metadata:
      labels:
        app: equation-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: amos-equation-api:v2.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: equation-api-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

---
apiVersion: v1
kind: Service
metadata:
  name: equation-api
  namespace: amos-equation
  labels:
    app: equation-api
spec:
  type: ClusterIP
  selector:
    app: equation-api
  ports:
    - port: 8000
      targetPort: 8000
      name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: equation-api-hpa
  namespace: amos-equation
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: equation-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: equation-api-pdb
  namespace: amos-equation
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: equation-api

---
# Network Policy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: equation-api-network-policy
  namespace: amos-equation
spec:
  podSelector:
    matchLabels:
      app: equation-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: amos
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - {}
