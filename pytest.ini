[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    system: System-level end-to-end tests
    law: Global Laws L1-L6 compliance tests
    security: Security and authentication tests
    performance: Performance and load tests
    slow: Tests that take longer to run

# Options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Coverage
cov_source =
    amos_unified_system
    amos_hybrid_orchestrator
    amos_mcp_tools
    amos_auth_integration
    amos_memory_system

cov_report = term-missing

# Ignore paths
norecursedirs =
    .git
    .tox
    .env
    venv
    __pycache__
    *.egg-info
    dist
    build
