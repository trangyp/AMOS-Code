# ArgoCD ApplicationSet: Multi-Environment AMOS Deployment
# Deploys AMOS to multiple environments (dev, staging, prod)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: amos-multicluster
  namespace: argocd
spec:
  # Git generator - creates apps for each environment
  generators:
    - git:
        repoURL: https://github.com/amos/amos.git
        revision: HEAD
        directories:
          - path: gitops/environments/*

  # Template for each generated Application
  template:
    metadata:
      name: 'amos-{{path.basename}}'
      labels:
        app.kubernetes.io/name: amos
        app.kubernetes.io/environment: '{{path.basename}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io

    spec:
      project: default

      source:
        repoURL: https://github.com/amos/amos.git
        targetRevision: HEAD
        path: k8s/amos
        helm:
          valueFiles:
            - 'gitops/environments/{{path.basename}}/values.yaml'
          parameters:
            - name: global.environment
              value: '{{path.basename}}'

      destination:
        server: https://kubernetes.default.svc
        namespace: 'amos-{{path.basename}}'

      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

      revisionHistoryLimit: 10

  # Progressive sync strategy
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: app.kubernetes.io/environment
              operator: In
              values:
                - dev
          maxUpdate: 100%
        - matchExpressions:
            - key: app.kubernetes.io/environment
              operator: In
              values:
                - staging
          maxUpdate: 50%
        - matchExpressions:
            - key: app.kubernetes.io/environment
              operator: In
              values:
                - prod
          maxUpdate: 25%
