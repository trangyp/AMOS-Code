# ArgoCD Application: AMOS Monitoring Stack
# Deploys Prometheus, Grafana, and Alertmanager
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amos-monitoring
  namespace: argocd
  labels:
    app.kubernetes.io/name: amos
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/version: "2.9.0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  source:
    repoURL: https://github.com/amos/amos.git
    targetRevision: HEAD
    path: gitops/monitoring
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true

  revisionHistoryLimit: 5
