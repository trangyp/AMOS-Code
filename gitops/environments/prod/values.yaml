# AMOS Production Environment Configuration

global:
  environment: production
  domain: api.amos.ai

api:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

graphql:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 60
  podDisruptionBudget:
    enabled: true
    minAvailable: 2

websocket:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10

workers:
  replicaCount: 5
  autoscaling:
    enabled: true
    minReplicas: 5
    maxReplicas: 50
    targetCPUUtilizationPercentage: 50

postgresql:
  primary:
    persistence:
      size: 100Gi
      storageClass: premium-rwo
    resources:
      limits:
        memory: 8Gi
        cpu: 4000m
      requests:
        memory: 4Gi
        cpu: 2000m
  readReplicas:
    replicaCount: 2
    resources:
      limits:
        memory: 4Gi

redis:
  master:
    persistence:
      size: 50Gi
    resources:
      limits:
        memory: 4Gi
        cpu: 2000m
      requests:
        memory: 2Gi
        cpu: 1000m
  replica:
    replicaCount: 2

kafka:
  replicaCount: 3
  persistence:
    size: 200Gi
    storageClass: premium-rwo
  resources:
    limits:
      memory: 8Gi
      cpu: 4000m
    requests:
      memory: 4Gi
      cpu: 2000m
  zookeeper:
    replicaCount: 3

monitoring:
  enabled: true
  prometheus:
    retention: 30d
    persistence:
      size: 100Gi
  grafana:
    enabled: true
    persistence:
      size: 10Gi

ingress:
  enabled: true
  tls:
    enabled: true
    certManager:
      enabled: true
      issuer: "letsencrypt-prod"

networkPolicy:
  enabled: true

# Backup configuration
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: 30
