# AMOS Dev Environment Configuration

global:
  environment: dev
  domain: dev.amos.local

api:
  replicaCount: 1
  autoscaling:
    enabled: false
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

graphql:
  replicaCount: 1
  autoscaling:
    enabled: false

websocket:
  replicaCount: 1

workers:
  replicaCount: 1
  autoscaling:
    enabled: false

postgresql:
  primary:
    persistence:
      size: 10Gi
    resources:
      limits:
        memory: 1Gi
        cpu: 500m
  readReplicas:
    replicaCount: 0

redis:
  master:
    persistence:
      size: 5Gi
    resources:
      limits:
        memory: 512Mi
  replica:
    replicaCount: 0

kafka:
  replicaCount: 1
  persistence:
    size: 20Gi
  zookeeper:
    replicaCount: 1

monitoring:
  enabled: false

ingress:
  enabled: true
  tls:
    enabled: false
