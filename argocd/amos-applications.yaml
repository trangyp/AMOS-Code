# Argo CD Applications for AMOS 6-Repo Platform
# GitOps continuous deployment configuration

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amos-consulting
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: amos-platform
  source:
    repoURL: https://github.com/trangyp/AMOS-Consulting.git
    targetRevision: main
    path: k8s/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: amos-consulting
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
---
