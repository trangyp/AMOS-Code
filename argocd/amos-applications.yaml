# App of Apps pattern for managing all AMOS applications
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amos-platform-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/trangyp/AMOS-Code.git
    targetRevision: main
    path: argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# AMOS Platform Project
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: amos-platform
  namespace: argocd
spec:
  description: AMOS Platform - 6 Repository System
  sourceRepos:
    - https://github.com/trangyp/AMOS-Code.git
    - https://github.com/trangyp/AMOS-Consulting.git
    - https://github.com/trangyp/AMOS-Claws.git
    - https://github.com/trangyp/Mailinhconect.git
    - https://github.com/trangyp/AMOS-Invest.git
    - https://github.com/trangyp/AMOS-UNIVERSE.git
  destinations:
    - namespace: amos-consulting
      server: https://kubernetes.default.svc
    - namespace: amos-claws
      server: https://kubernetes.default.svc
    - namespace: mailinhconect
      server: https://kubernetes.default.svc
    - namespace: amos-invest
      server: https://kubernetes.default.svc
    - namespace: amos-shared
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: networking.k8s.io
      kind: Ingress
    - group: autoscaling
      kind: HorizontalPodAutoscaler
