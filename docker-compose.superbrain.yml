# AMOS SuperBrain v3.0 - Docker Compose
# Production deployment at 75% health (API keys injected via environment)
#
# Quick Start:
#   1. Copy .env.example to .env and configure
#   2. docker-compose -f docker-compose.superbrain.yml up -d
#   3. Access: http://localhost:8000
#
# To reach 100% health, set API keys in .env file:
#   OPENAI_API_KEY=sk-...
#   ANTHROPIC_API_KEY=sk-ant-...
#   KIMI_API_KEY=...

version: '3.8'

services:
  # ============================================================================
  # AMOS SuperBrain Core
  # ============================================================================
  amos-superbrain:
    build:
      context: .
      dockerfile: Dockerfile
    image: amos-superbrain:3.0
    container_name: amos-superbrain
    ports:
      - "8000:8000"
    environment:
      # Application
      APP_NAME: AMOS SuperBrain
      DEBUG: "false"
      ENVIRONMENT: production
      HOST: 0.0.0.0
      PORT: 8000

      # LLM Providers (empty = 75% health, filled = 100% health)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}

      # Security
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}

      # Observability
      LOG_LEVEL: INFO
      HEALTH_CHECK_INTERVAL: 60

    volumes:
      # Persistence
      - ./data:/app/data
      - ./logs:/app/logs
      - ./memory:/app/memory
      - ./amos_logs:/app/amos_logs
    networks:
      - amos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.path.insert(0, '/app'); from amos_brain import get_super_brain; brain = get_super_brain(); state = brain.get_state(); exit(0 if state.health_score >= 0.75 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================================
  # Redis (Cache + State Management)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: amos-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - amos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # Health Monitor Dashboard (Optional)
  # ============================================================================
  health-dashboard:
    image: amos-superbrain:3.0
    container_name: amos-health-dashboard
    command: python3 -c "
import sys
import time
sys.path.insert(0, '/app')
from amos_observability.health_monitor import get_health_monitor
from amos_brain import get_super_brain
brain = get_super_brain()
monitor = get_health_monitor()
monitor.start()
while True:
    health = monitor.get_current_health()
    if health:
        print(f'Health: {health.overall_score:.0%} - {health.overall_status.value}')
    time.sleep(60)
"
    environment:
      APP_NAME: AMOS SuperBrain Health Monitor
    networks:
      - amos-network
    restart: unless-stopped
    depends_on:
      - amos-superbrain

volumes:
  redis-data:
    driver: local

networks:
  amos-network:
    driver: bridge
