# AMOS Open-Source Baseline Pre-commit Configuration
# Install: pre-commit install
# Run all: pre-commit run --all-files
# Docs: https://pre-commit.com

minimum_pre_commit_version: "3.6.0"
default_stages: [pre-commit, pre-push]
fail_fast: false

# ============================================================================
# AMOS TOOL LATTICE - Six-Kernel Enforcement Order
# 1. Syntax & Formatting (Ruff)
# 2. Tests (pytest)
# 3. Architecture (import-linter)
# 4. Duplication/Dependency/Security
# ============================================================================

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$|\.json$'
      - id: end-of-file-fixer
        exclude: '\.json$'
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-symlinks
      - id: debug-statements
      - id: detect-private-key
      - id: mixed-line-ending
      - id: requirements-txt-fixer

  # Python linting and formatting (Ruff - replaces black, flake8, isort)
  # KERNEL 1: Syntax & Formatting (fast feedback)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.1
    hooks:
      - id: ruff
        name: ruff-lint-format
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff-format
        types_or: [python, pyi]

  # KERNEL 6: Tests & Async (second priority)
  - repo: local
    hooks:
      - id: pytest
        name: AMOS Test Runner (pytest + asyncio)
        entry: python -m pytest
        args: ["-q", "--tb=short", "--strict-markers"]
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # Python type checking (MyPy)
  # Type checking (runs after tests, before architecture)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: mypy-type-check
        additional_dependencies:
          - pydantic>=2.5.0
          - types-PyYAML
          - types-requests
        args: [--ignore-missing-imports, --show-error-codes]
        exclude: "tests/|test_|venv/|.venv/|__pycache__/"
        stages: [pre-push]

  # Architecture: Import Linter - Enforces layered architecture
  # Docs: https://import-linter.readthedocs.io/
  - repo: local
    hooks:
      - id: import-linter
        name: AMOS Architecture Enforcement (Import Linter)
        entry: lint-imports
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # Duplicate Detection: jscpd - Finds code duplication
  # Docs: https://jscpd.dev/
  - repo: local
    hooks:
      - id: jscpd
        name: AMOS Duplicate Detection (jscpd)
        entry: jscpd
        args: ["--config", ".jscpd.json"]
        language: node
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # Dependency Audit: deptry - Finds missing/unused dependencies
  # Docs: https://deptry.com/
  - repo: local
    hooks:
      - id: deptry
        name: AMOS Dependency Audit (deptry)
        entry: deptry
        args: ["."]
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # Security: Secret scanning (Gitleaks)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets
        description: Detects hardcoded secrets using Gitleaks
        entry: gitleaks detect --verbose --redact --source .
        language: golang
        pass_filenames: false

  # Security: Static analysis (Semgrep)
  - repo: https://github.com/semgrep/pre-commit
    rev: v1.52.0
    hooks:
      - id: semgrep
        name: Semgrep security scan
        args: ['--config=auto', '--error', '--skip-unknown-extensions']
        stages: [pre-push]

  # Security: Dependency vulnerability scanning (OSV-Scanner)
  # Note: Requires osv-scanner binary installed
  - repo: local
    hooks:
      - id: osv-scanner
        name: OSV-Scanner dependency audit
        entry: osv-scanner
        args: ["-r", "."]
        language: system
        pass_filenames: false
        stages: [pre-push]

  # ============================================================================
  # AMOS TOOL LATTICE - Architecture Enforcement Kernel
  # ============================================================================

  # Architecture: Import Linter - Enforces layered architecture
  # Docs: https://import-linter.readthedocs.io/
  - repo: local
    hooks:
      - id: import-linter
        name: AMOS Architecture Enforcement (Import Linter)
        entry: lint-imports
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # Duplicate Detection: jscpd - Finds code duplication
  # Docs: https://jscpd.dev/
  - repo: local
    hooks:
      - id: jscpd
        name: AMOS Duplicate Detection (jscpd)
        entry: jscpd
        args: ["--config", ".jscpd.json"]
        language: node
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # Dependency Audit: deptry - Finds missing/unused dependencies
  # Docs: https://deptry.com/
  - repo: local
    hooks:
      - id: deptry
        name: AMOS Dependency Audit (deptry)
        entry: deptry
        args: ["."]
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # Security: Bandit - Python security linter
  # Docs: https://bandit.readthedocs.io/
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        name: AMOS Security Scan (Bandit)
        args: ["-c", "pyproject.toml", "-r", "."]
        exclude: "tests/|test_|venv/|.venv/|__pycache__/"
        stages: [pre-push]

  # Security: pip-audit - Dependency vulnerability scanner
  # Docs: https://pypi.org/project/pip-audit/
  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.0
    hooks:
      - id: pip-audit
        name: AMOS Vulnerability Audit (pip-audit)
        args: ["--requirement", "requirements.txt", "--requirement", "requirements-dev.txt"]
        stages: [pre-push]

  # Complexity: Radon - Code complexity analysis
  # Docs: https://radon.readthedocs.io/
  - repo: local
    hooks:
      - id: radon
        name: AMOS Complexity Check (radon)
        entry: radon
        args: ["cc", "-nc", "C", "-s", "."]
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
