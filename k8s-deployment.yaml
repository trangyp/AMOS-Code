apiVersion: apps/v1
kind: Deployment
metadata:
  name: amos-orchestrator
  namespace: amos
  labels:
    app: amos-orchestrator
    version: v14.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: amos-orchestrator
  template:
    metadata:
      labels:
        app: amos-orchestrator
        version: v14.0.0
    spec:
      serviceAccountName: amos-orchestrator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: orchestrator
        image: amos/orchestrator:v14.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        env:
        - name: AMOS_ENV
          value: "production"
        - name: AMOS_LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: amos-data
      - name: logs
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: amos-orchestrator
  namespace: amos
  labels:
    app: amos-orchestrator
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: amos-orchestrator

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: amos-orchestrator
  namespace: amos
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  tls:
  - hosts:
    - amos.example.com
    secretName: amos-tls
  rules:
  - host: amos.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: amos-orchestrator
            port:
              number: 8000

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: amos-data
  namespace: amos
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: amos-orchestrator
  namespace: amos
  labels:
    app: amos-orchestrator
