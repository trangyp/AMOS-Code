<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMOS Brain Admin Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #fff;
        }
        .dashboard {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background: #1a1a2e;
            padding: 2rem;
            border-right: 1px solid #333;
        }
        .sidebar h1 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #4CAF50;
        }
        .nav-item {
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nav-item:hover, .nav-item.active {
            background: #252542;
        }
        .main {
            padding: 2rem;
            overflow-y: auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #252542;
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #4CAF50;
        }
        .stat-label {
            color: #888;
            margin-top: 0.5rem;
        }
        .chart-container {
            height: 300px;
            margin-top: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            color: #888;
            font-weight: 500;
        }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        .badge.success { background: #4CAF50; }
        .badge.warning { background: #FFC107; color: #000; }
        .badge.error { background: #f44336; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const API_BASE = 'https://neurosyncai.tech';
        
        function Dashboard() {
            const [activeTab, setActiveTab] = useState('overview');
            const [stats, setStats] = useState({
                totalRequests: 0,
                avgResponseTime: 0,
                successRate: 100,
                activeKeys: 0
            });
            
            useEffect(() => {
                // Simulate fetching stats
                setStats({
                    totalRequests: 15234,
                    avgResponseTime: 245,
                    successRate: 99.8,
                    activeKeys: 47
                });
            }, []);
            
            const renderOverview = () => (
                <div>
                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-value">{stats.totalRequests.toLocaleString()}</div>
                            <div className="stat-label">Total Requests</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">{stats.avgResponseTime}ms</div>
                            <div className="stat-label">Avg Response Time</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">{stats.successRate}%</div>
                            <div className="stat-label">Success Rate</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">{stats.activeKeys}</div>
                            <div className="stat-label">Active API Keys</div>
                        </div>
                    </div>
                    
                    <div className="card">
                        <h3>Request Volume (Last 7 Days)</h3>
                        <canvas id="requestsChart" className="chart-container"></canvas>
                    </div>
                    
                    <div className="card">
                        <h3>Response Time Trends</h3>
                        <canvas id="responseChart" className="chart-container"></canvas>
                    </div>
                </div>
            );
            
            const renderQueryHistory = () => (
                <div className="card">
                    <h3>Recent Queries</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Endpoint</th>
                                <th>Query</th>
                                <th>Domain</th>
                                <th>Confidence</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>2 min ago</td>
                                <td>/think</td>
                                <td>Benefits of microservices?</td>
                                <td>software</td>
                                <td>high</td>
                                <td><span className="badge success">✓</span></td>
                            </tr>
                            <tr>
                                <td>5 min ago</td>
                                <td>/decide</td>
                                <td>Which database to use?</td>
                                <td>software</td>
                                <td>medium</td>
                                <td><span className="badge success">✓</span></td>
                            </tr>
                            <tr>
                                <td>12 min ago</td>
                                <td>/validate</td>
                                <td>Deploy to production</td>
                                <td>general</td>
                                <td>-</td>
                                <td><span className="badge warning">!</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            );
            
            const renderAPIKeys = () => (
                <div className="card">
                    <h3>API Keys</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Key ID</th>
                                <th>Created</th>
                                <th>Requests (24h)</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>key_abc123...</td>
                                <td>2024-01-15</td>
                                <td>1,234</td>
                                <td><span className="badge success">Active</span></td>
                                <td><button>Revoke</button></td>
                            </tr>
                            <tr>
                                <td>key_def456...</td>
                                <td>2024-01-14</td>
                                <td>567</td>
                                <td><span className="badge success">Active</span></td>
                                <td><button>Revoke</button></td>
                            </tr>
                        </tbody>
                    </table>
                    <button style={{marginTop: '1rem', padding: '0.5rem 1rem'}}>
                        + Generate New Key
                    </button>
                </div>
            );
            
            useEffect(() => {
                if (activeTab === 'overview') {
                    // Initialize charts
                    setTimeout(() => {
                        const ctx1 = document.getElementById('requestsChart');
                        if (ctx1) {
                            new Chart(ctx1, {
                                type: 'line',
                                data: {
                                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                                    datasets: [{
                                        label: 'Requests',
                                        data: [2100, 2300, 2200, 2500, 2800, 1900, 1600],
                                        borderColor: '#4CAF50',
                                        tension: 0.4
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: { legend: { display: false } }
                                }
                            });
                        }
                        
                        const ctx2 = document.getElementById('responseChart');
                        if (ctx2) {
                            new Chart(ctx2, {
                                type: 'line',
                                data: {
                                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                                    datasets: [{
                                        label: 'Response Time (ms)',
                                        data: [240, 235, 245, 230, 250, 260, 255],
                                        borderColor: '#2196F3',
                                        tension: 0.4
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: { legend: { display: false } }
                                }
                            });
                        }
                    }, 100);
                }
            }, [activeTab]);
            
            return (
                <div className="dashboard">
                    <div className="sidebar">
                        <h1>🧠 AMOS Brain</h1>
                        <nav>
                            <div 
                                className={`nav-item ${activeTab === 'overview' ? 'active' : ''}`}
                                onClick={() => setActiveTab('overview')}
                            >
                                📊 Overview
                            </div>
                            <div 
                                className={`nav-item ${activeTab === 'queries' ? 'active' : ''}`}
                                onClick={() => setActiveTab('queries')}
                            >
                                📝 Query History
                            </div>
                            <div 
                                className={`nav-item ${activeTab === 'keys' ? 'active' : ''}`}
                                onClick={() => setActiveTab('keys')}
                            >
                                🔑 API Keys
                            </div>
                            <div 
                                className={`nav-item ${activeTab === 'analytics' ? 'active' : ''}`}
                                onClick={() => setActiveTab('analytics')}
                            >
                                📈 Analytics
                            </div>
                        </nav>
                    </div>
                    
                    <div className="main">
                        <div className="header">
                            <h2>
                                {activeTab === 'overview' && 'Dashboard Overview'}
                                {activeTab === 'queries' && 'Query History'}
                                {activeTab === 'keys' && 'API Key Management'}
                                {activeTab === 'analytics' && 'Analytics'}
                            </h2>
                            <div>
                                <span style={{color: '#4CAF50'}}>●</span> System Operational
                            </div>
                        </div>
                        
                        {activeTab === 'overview' && renderOverview()}
                        {activeTab === 'queries' && renderQueryHistory()}
                        {activeTab === 'keys' && renderAPIKeys()}
                        {activeTab === 'analytics' && (
                            <div className="card">
                                <h3>Detailed Analytics</h3>
                                <p>Analytics data visualization coming soon...</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        
        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
