name: AMOS 57-Component CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.11'
  TEST_TIMEOUT: 300

jobs:
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: |
          pip install ruff mypy black isort
          pip install -e ".[all,dev]"
      - name: Run Ruff linting on published packages
        run: ruff check amos_brain amosl amos_model_fabric amos_self_evolution amos_platform
      - name: Run Black format check on published packages
        run: black --check amos_brain amosl amos_model_fabric amos_self_evolution amos_platform
      - name: Run MyPy type check on published packages
        run: mypy amos_brain amosl --ignore-missing-imports

  test-57-complete:
    name: Test All 57 Components
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: |
          pip install -e ".[all,dev]"
          pip install pytest pytest-cov
      - name: Import smoke test - all published packages
        run: |
          python3 -c "
          import amos_brain
          import amosl
          import amos_model_fabric
          import amos_self_evolution
          import amos_platform
          import multi_agent
          import skill
          import search
          import streaming
          import memory
          import analytics
          import repo_doctor
          print('All published packages import successfully')
          "
      - name: Run package tests
        run: pytest tests/ -v --tb=short

  deployment-readiness:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: test-57-complete
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -e ".[all]"
      - name: Validate published packages
        run: |
          python3 -c "
          import sys
          packages = [
              'amos_brain', 'amosl', 'amos_model_fabric', 'amos_self_evolution',
              'amos_platform', 'multi_agent', 'skill', 'search', 'streaming',
              'memory', 'analytics', 'repo_doctor'
          ]
          failed = []
          for pkg in packages:
              try:
                  __import__(pkg)
                  print(f'✓ {pkg}')
              except Exception as e:
                  print(f'✗ {pkg}: {e}')
                  failed.append(pkg)
          if failed:
              sys.exit(1)
          print('All packages validated successfully')
          "
      - name: Generate Report
        run: echo "PUBLISHED PACKAGES VALIDATED - READY FOR DEPLOYMENT" > DEPLOYMENT_REPORT.txt
      - uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: DEPLOYMENT_REPORT.txt

  performance-benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: test-57-complete
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -e ".[all]"
      - name: Run Performance Benchmarks
        run: python3 benchmark_57_components.py
      - name: Upload Benchmark Report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: PERFORMANCE_BENCHMARK_REPORT.md
