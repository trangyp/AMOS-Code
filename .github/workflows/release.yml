name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true
        draft: false
        prerelease: false

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine upload dist/*
      # Note: Removed continue-on-error - releases should fail if package doesn't publish

  docker-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT
          echo "major_minor=$(echo $VERSION | cut -d. -f1,2)" >> $GITHUB_OUTPUT

      - name: Build and push release image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.equation
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/amos-equation:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/amos-equation:${{ steps.version.outputs.major_minor }}
            ghcr.io/${{ github.repository }}/amos-equation:${{ steps.version.outputs.major }}
            ghcr.io/${{ github.repository }}/amos-equation:latest
          platforms: linux/amd64,linux/arm64

  helm-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.0'

      - name: Package Helm chart
        run: |
          helm package ./helm/amos-equation --destination ./dist

      - name: Upload Helm chart
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: ./dist/amos-equation-*.tgz
          retention-days: 365

      - name: Create Helm index
        run: |
          helm repo index ./dist --url https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/amos-equation-*.tgz
            ./dist/index.yaml
