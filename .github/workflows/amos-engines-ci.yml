name: AMOS Engines CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'amos_temporal_engine.py'
      - 'amos_field_dynamics.py'
      - 'amos_self_evolution_test_suite.py'
      - 'amos_engine_integration.py'
      - 'amos_observability_v2.py'
      - 'tests/test_engines_comprehensive.py'
  pull_request:
    branches: [main, develop]

jobs:
  test-engines:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio numpy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Check syntax of new engines
        run: |
          python -m py_compile amos_temporal_engine.py
          python -m py_compile amos_field_dynamics.py
          python -m py_compile amos_self_evolution_test_suite.py
          python -m py_compile amos_engine_integration.py
          python -m py_compile amos_observability_v2.py
          echo "✅ All engine syntax valid"

      - name: Test imports
        run: |
          python -c "from amos_temporal_engine import get_temporal_engine; print('✅ Temporal')"
          python -c "from amos_field_dynamics import create_scalar_field; print('✅ Field')"
          python -c "from amos_self_evolution_test_suite import get_self_evolution_test_suite; print('✅ Safety')"
          python -c "from amos_engine_integration import get_engine_integration; print('✅ Integration')"
          python -c "from amos_observability_v2 import get_observability; print('✅ Observability')"

      - name: Run comprehensive test suite
        run: |
          pytest tests/test_engines_comprehensive.py -v --tb=short

      - name: Run multi-engine demo
        run: |
          python amos_demo_multi_engine.py
          echo "✅ Multi-engine demo passed"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            .pytest_cache/
            test-reports/

  lint-engines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: |
          pip install ruff mypy

      - name: Run Ruff on new engines
        run: |
          ruff check amos_temporal_engine.py amos_field_dynamics.py amos_self_evolution_test_suite.py amos_engine_integration.py amos_observability_v2.py

      - name: Type check with mypy
        run: |
          mypy amos_temporal_engine.py amos_field_dynamics.py --ignore-missing-imports || true

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r amos_temporal_engine.py amos_field_dynamics.py amos_self_evolution_test_suite.py -f json -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v3
        with:
          name: security-report
          path: bandit-report.json
