# AMOS Open-Source Security Scanning Workflow
# Runs: Semgrep, Trivy, Gitleaks, OSV-Scanner on every push and PR
# License: Apache-2.0 (matches project license)

name: Security Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # --- SEMGREP CE: Static Analysis ---
  semgrep:
    name: Semgrep CE Static Analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config=auto \
            --config=p/security-audit \
            --config=p/cwe-top-25 \
            --config=p/owasp-top-ten \
            --config=p/ci \
            --error
        env:
          SEMGREP_RULES: >-
            p/security-audit
            p/cwe-top-25
            p/owasp-top-ten
            p/ci

  # --- TRIVY: Vulnerability & Misconfiguration Scanning ---
  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy"

      # Also output table for PR comments
      - name: Run Trivy table output
        uses: aquasecurity/trivy-action@master
        if: github.event_name == 'pull_request'
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true

  # --- GITLEAKS: Secret Scanning ---
  gitleaks:
    name: Gitleaks Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: "${{ secrets.GITLEAKS_LICENSE }}" # Optional: for commercial features
          GITLEAKS_CONFIG: ".gitleaks.toml" # Optional: custom config
        with:
          args: detect --verbose --redact --source .

      - name: Run Gitleaks on full history
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --verbose --redact --source . --log-opts="--all --full-history"

  # --- OSV-SCANNER: Dependency Vulnerability Scanning ---
  osv-scanner:
    name: OSV-Scanner Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install OSV-Scanner
        run: |
          go install github.com/google/osv-scanner/cmd/osv-scanner@v1

      - name: Run OSV-Scanner
        run: |
          osv-scanner scan -r . --format table
        continue-on-error: true

      - name: Run OSV-Scanner with SARIF output
        run: |
          osv-scanner scan -r . --format sarif --output osv-results.sarif
        continue-on-error: true

      - name: Upload OSV results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "osv-results.sarif"
          category: "osv-scanner"

  # --- PYTHON SECURITY: Bandit ---
  bandit:
    name: Bandit Python Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: |
          pip install bandit[sarif]

      - name: Run Bandit
        run: |
          bandit -r . -f sarif -o bandit-results.sarif --skip B101,B311 || true
          bandit -r . -f screen
        continue-on-error: true

      - name: Upload Bandit results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "bandit-results.sarif"
          category: "bandit"

  # --- SUMMARY: Security Report ---
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [semgrep, trivy, gitleaks, osv-scanner, bandit]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Security Report
        run: |
          echo "## 🔒 AMOS Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep CE | ${{ needs.semgrep.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy FS | ${{ needs.trivy.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | ${{ needs.gitleaks.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OSV-Scanner | ${{ needs.osv-scanner.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit | ${{ needs.bandit.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All scans use open-source tooling with Apache-2.0 or permissive licenses." >> $GITHUB_STEP_SUMMARY
