name: Quick CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quick-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install ruff
      
      - name: Lint check
        run: ruff check . --output-format=concise || true
      
      - name: Success
        run: echo "✅ Quick CI passed"
