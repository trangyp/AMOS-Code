# AMOS Brain Health CI Gate
name: Brain Health

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wheel-install:
    name: Wheel Install in Fresh Venv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build --wheel
      - run: ls -la dist/
      - run: |
          python -m venv /tmp/fresh-venv
          source /tmp/fresh-venv/bin/activate
          pip install dist/amos_brain-*.whl
          pip list | grep amos-brain
      - run: |
          source /tmp/fresh-venv/bin/activate
          cd /tmp
          python -c "import amos_brain; print('OK')"

  entrypoints:
    name: Console Entrypoints Work
    runs-on: ubuntu-latest
    needs: wheel-install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build --wheel
      - run: pip install dist/amos_brain-*.whl
      - run: |
          cd /tmp
          amos-brain --help

  docker-check:
    name: Docker Startup Uses Canonical Path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t amos-brain:test .
      - run: docker run --rm amos-brain:test amos-brain --help

  no-root-scripts:
    name: No Root-Level Script Execution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          executable_roots=$(find . -maxdepth 1 -name "*.py" -type f | head -20)
          echo "Root Python files: $executable_roots"
      - run: python -c "import amos_brain; print('Package OK')"

  import-graph:
    name: Import Graph Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .
      - run: |
          python -c "from amos_brain import get_brain, process_task, GlobalLaws; print('Imports OK')"

  contract-exists:
    name: Runtime Contract File Exists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          if [ -f "amos_brain_contract.json" ]; then
            echo "Contract file exists"
            cat amos_brain_contract.json | head -20
          else
            echo "Contract file not found"
          fi

  doctor:
    name: Brain Doctor Self-Diagnosis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .
      - run: amos-brain doctor

  brain-health-summary:
    name: Brain Health Summary
    runs-on: ubuntu-latest
    needs: [wheel-install, entrypoints, docker-check, no-root-scripts, import-graph, contract-exists, doctor]
    if: always()
    steps:
      - run: |
          echo "BRAIN HEALTH SUMMARY"
          echo "Wheel Install: ${{ needs.wheel-install.result }}"
          echo "Entrypoints: ${{ needs.entrypoints.result }}"
          echo "Docker: ${{ needs.docker-check.result }}"
          echo "Import Graph: ${{ needs.import-graph.result }}"
          echo "Doctor: ${{ needs.doctor.result }}"
      - name: Fail if any check failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
