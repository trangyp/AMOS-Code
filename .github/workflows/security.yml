# AMOS Security Scanning Pipeline
# Runs security checks on code and dependencies
# Author: Trang Phan

name: Security

on:
  push:
    branches: [main, master]
    paths:
      - '**.py'
      - 'requirements*.txt'
      - 'pyproject.toml'
  pull_request:
    branches: [main, master]
    paths:
      - '**.py'
      - 'requirements*.txt'
      - 'pyproject.toml'
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit scan
        run: |
          # Run bandit security scan on actual packages - blocking on issues
          bandit -r amos_brain amosl amos_model_fabric amos_self_evolution amos_platform -f json -o bandit-report.json \
            --skip B101
          bandit -r amos_brain amosl amos_model_fabric amos_self_evolution amos_platform -f screen

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install safety
        run: |
          python -m pip install --upgrade pip
          pip install safety

      - name: Check dependencies for vulnerabilities
        run: |
          # Install package to check its dependencies
          pip install -e ".[all]"
          # Safety check for known vulnerabilities - blocking for critical issues
          safety check

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  docker-security:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-security-report
          path: trivy-results.sarif
          retention-days: 30

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [bandit, dependency-check, secret-scan, docker-security]
    if: always()

    steps:
      - name: Security Check Summary
        run: |
          echo "Security Scanning Complete"
          echo "========================="
          echo "Bandit: ${{ needs.bandit.result }}"
          echo "Dependencies: ${{ needs.dependency-check.result }}"
          echo "Secrets: ${{ needs.secret-scan.result }}"
          echo "Docker: ${{ needs.docker-security.result }}"
