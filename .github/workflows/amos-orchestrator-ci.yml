name: AMOS Orchestrator CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "amos_production_orchestrator.py"
      - "amos_cli_orchestrator.py"
      - "amos_*.py"
      - "AMOS_*.py"
      - ".github/workflows/amos-orchestrator-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "amos_production_orchestrator.py"
      - "amos_cli_orchestrator.py"
      - "amos_*.py"
      - "AMOS_*.py"
      - ".github/workflows/amos-orchestrator-ci.yml"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  AMOS_ENV: "ci"

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy fastapi uvicorn

      - name: Run Ruff linter
        run: |
          ruff check amos_production_orchestrator.py amos_cli_orchestrator.py

      - name: Run Ruff formatter
        run: |
          ruff format --check amos_production_orchestrator.py amos_cli_orchestrator.py

      - name: Run MyPy type checker
        run: |
          mypy amos_production_orchestrator.py amos_cli_orchestrator.py --ignore-missing-imports

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn

      - name: Run smoke test
        run: |
          python -c "
          from amos_production_orchestrator import get_orchestrator
          orch = get_orchestrator()
          print(f'✓ Orchestrator instantiated')
          print(f'✓ Modules discovered: {len(orch.modules)}')
          print(f'✓ API routes configured')
          "

      - name: Test CLI help
        run: |
          python amos_cli_orchestrator.py --help

  orchestrator-validation:
    name: Orchestrator Validation
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn

      - name: Validate orchestrator
        run: |
          python amos_cli_orchestrator.py validate

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: orchestrator-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn

      - name: Run integration test
        run: |
          python -c "
          import asyncio
          from amos_production_orchestrator import get_orchestrator
          orch = get_orchestrator()
          success = asyncio.run(orch.initialize())
          if not success:
              print('❌ Orchestrator initialization failed')
              exit(1)

          activated = sum(1 for m in orch.modules.values() if m.activated)
          total = len(orch.modules)
          rate = activated / total if total > 0 else 0

          print(f'✓ Initialization successful')
          print(f'✓ Modules: {activated}/{total} ({rate:.1%})')
          print(f'✓ Memory bridges: {len(orch.bridges)}')
          print(f'✓ Guardrails: {len(orch.guardrails)}')

          if rate < 0.5:
              print(f'⚠️ Activation rate below threshold: {rate:.1%}')
              exit(1)
          "

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [smoke-test, orchestrator-validation]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.production -t amos-orchestrator:test .

      - name: Test Docker image
        run: |
          docker run --rm amos-orchestrator:test python -c "
          from amos_production_orchestrator import get_orchestrator
          orch = get_orchestrator()
          print(f'Modules: {len(orch.modules)}')
          "

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [integration-test, docker-build]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "✓ Staging deployment simulated"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [integration-test, docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production environment..."
          echo "✓ Production deployment simulated"
