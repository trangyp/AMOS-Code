name: CI/CD Pipeline - Test, Build, Deploy

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Nightly builds at 2 AM

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Phase 1: Test
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/setup.py') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || true
        pip install pytest pytest-asyncio pytest-cov aiohttp

    - name: Run unit tests
      run: |
        python -m pytest tests/ -v --tb=short --cov=amos_brain --cov-report=xml -x

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        verbose: true

  # Phase 2: Lint and Quality Checks
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install lint tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black mypy isort bandit

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=15 --max-line-length=100 --statistics

    - name: Check formatting with black
      run: |
        black --check . || echo "Formatting issues found"

    - name: Import sort check
      run: |
        isort --check-only . || echo "Import sorting issues found"

    - name: Security check with bandit
      run: |
        bandit -r . -f json -o bandit-report.json || true
        cat bandit-report.json || echo "No security issues found"

  # Phase 3: Integration Test
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, quality]
    services:
      api:
        image: amos-brain:latest
        ports:
          - 5000:5000
        options: >-
          --health-cmd "curl -f http://localhost:5000/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install aiohttp pytest asyncio

    - name: Wait for API to be ready
      run: |
        sleep 10
        curl -f http://localhost:5000/health || exit 1

    - name: Run integration tests
      run: |
        python test_unified_integration.py || true

    - name: Test API endpoints
      run: |
        curl -f http://localhost:5000/health
        curl -f http://localhost:5000/status
        curl -X POST http://localhost:5000/think \
          -H "Content-Type: application/json" \
          -d '{"query": "CI/CD test", "domain": "software"}'

  # Phase 4: Load Test
  load-test:
    name: Load Testing
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install aiohttp

    - name: Start API server
      run: |
        python amos_api_server.py &
        sleep 5
        curl -f http://localhost:5000/health

    - name: Run load test (short)
      run: |
        python amos_load_test.py --duration 30 --concurrency 10 --endpoint health --output load-test-results.json
        cat load-test-results.json

    - name: Check load test results
      run: |
        python << 'EOF'
        import json
        with open('load-test-results.json') as f:
            data = json.load(f)
            error_rate = data.get('error_rate', 100)
            avg_time = data.get('avg_response_time_ms', 9999)
            print(f"Error rate: {error_rate}%")
            print(f"Avg response: {avg_time}ms")
            if error_rate > 5:
                print("Load test failed: Error rate too high")
                exit(1)
            if avg_time > 1000:
                print("Load test failed: Response time too slow")
                exit(1)
            print("Load test passed")
        EOF

    - name: Upload load test results
      uses: actions/upload-artifact@v4
      with:
        name: load-test-results
        path: load-test-results.json

  # Phase 5: Build Docker Image
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, quality, integration]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  # Phase 6: Deploy to Production
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: [build, load-test]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Hostinger via SSH
      env:
        HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
        HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
        HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
      run: |
        # Setup SSH
        mkdir -p ~/.ssh
        echo "$HOSTINGER_SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H "$HOSTINGER_HOST" >> ~/.ssh/known_hosts
        
        # Copy deployment script
        scp deploy-to-hostinger.sh "$HOSTINGER_USER@$HOSTINGER_HOST:~/"
        
        # Execute deployment
        ssh "$HOSTINGER_USER@$HOSTINGER_HOST" "
          cd ~ && 
          chmod +x deploy-to-hostinger.sh && 
          ./deploy-to-hostinger.sh
        "

    - name: Verify deployment
      run: |
        sleep 30
        curl -f https://neurosyncai.tech/health || exit 1
        echo "✅ Deployment successful"

    - name: Post-deployment health check
      run: |
        echo "Running post-deployment checks..."
        curl -f https://neurosyncai.tech/status
        curl -f https://neurosyncai.tech/api/metrics/summary
        echo "✅ All health checks passed"

  # Phase 7: Notify
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    
    steps:
    - name: Send success notification
      if: needs.deploy.result == 'success'
      run: |
        echo "✅ AMOS Brain deployed successfully to neurosyncai.tech"
        echo "Deployment time: ${{ github.event.head_commit.timestamp }}"
        echo "Commit: ${{ github.sha }}"

    - name: Send failure notification
      if: needs.deploy.result == 'failure'
      run: |
        echo "❌ Deployment failed"
        echo "Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
