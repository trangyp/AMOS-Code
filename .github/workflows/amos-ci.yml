name: AMOS Ecosystem CI/CD

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'clawspring/**'
      - 'AMOS_ORGANISM_OS/**'
      - '.github/workflows/amos-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'clawspring/**'
      - 'AMOS_ORGANISM_OS/**'

jobs:
  validate:
    name: System Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn aiohttp numpy

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Install wheel and test entrypoints
        run: |
          pip install dist/amos_brain-*.whl
          amos-brain --help
          amosl --help

      - name: Test Package Imports from installed wheel
        run: |
          pip install dist/amos_brain-*.whl
          python -c "
          import amos_brain
          import amosl
          import amos_model_fabric
          import amos_self_evolution
          import amos_platform
          import multi_agent
          import skill
          import search
          import streaming
          import memory
          import analytics
          import repo_doctor
          import clawspring
          print('All declared packages import successfully')
          "

  test-deployment:
    name: Test Deployment
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Deployment
        working-directory: clawspring/amos_brain
        run: python deploy_amos.py
      - name: Verify Launchers
        run: |
          test -f clawspring/amos_brain/launch_amos.sh && echo "Unix launcher OK"
          test -f clawspring/amos_brain/launch_amos.bat && echo "Windows launcher OK"

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Tools
        run: pip install flake8
      - name: Run Flake8 on published packages
        run: flake8 amos_brain amosl amos_model_fabric --max-line-length=100
