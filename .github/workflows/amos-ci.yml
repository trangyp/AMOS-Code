name: AMOS Ecosystem CI/CD

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'clawspring/**'
      - 'AMOS_ORGANISM_OS/**'
      - '.github/workflows/amos-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'clawspring/**'
      - 'AMOS_ORGANISM_OS/**'

jobs:
  validate:
    name: System Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn aiohttp numpy

      - name: Run Cognitive Test Suite
        run: python test_cognitive_amos.py

      - name: Test Module Imports
        run: |
          python -c "import sys; sys.path[:0] = ['clawspring', 'clawspring/amos_brain']; [__import__(m) and print(f'OK: {m}') for m in ['amos_cognitive_router', 'engine_executor', 'organism_bridge', 'master_orchestrator', 'system_validator', 'deploy_amos']]; print('All modules OK')"

  test-deployment:
    name: Test Deployment
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Deployment
        working-directory: clawspring/amos_brain
        run: python deploy_amos.py
      - name: Verify Launchers
        run: |
          test -f clawspring/amos_brain/launch_amos.sh && echo "Unix launcher OK"
          test -f clawspring/amos_brain/launch_amos.bat && echo "Windows launcher OK"

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Tools
        run: pip install flake8
      - name: Run Flake8
        run: cd clawspring/amos_brain && flake8 --max-line-length=100 *.py || true
