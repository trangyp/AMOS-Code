name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/setup.py') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests (unittest-based)
      run: |
        python test_runner.py

    - name: Run memory profiling
      run: |
        pip install memray
        python profiling_suite.py --memory || true

    - name: Upload profiling results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: profiling-results-${{ matrix.python-version }}
        path: profiling_results/
        retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install lint tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black mypy

    - name: Lint with flake8
      run: |
        flake8 amos_brain --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 amos_brain --count --exit-zero --max-complexity=10 --max-line-length=79 --statistics

    - name: Format check with black
      run: |
        black --check amos_brain || true

    - name: Type check with mypy
      run: |
        mypy amos_brain --ignore-missing-imports || true
