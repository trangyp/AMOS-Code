# AMOS Production Stack - CI/CD Pipeline (Phase 12)
# =================================================
#
# Comprehensive testing and deployment for the production runtime stack:
# - FastAPI Gateway (Phase 10)
# - Production Runtime (Phase 8)
# - Self-Healing (Phase 7)
# - Bootstrap Orchestrator (Phase 6)
#
# Triggers:
#   - Push to main branch
#   - Pull requests to main
#   - Manual dispatch
#   - Weekly schedule (Sundays at 00:00)
#
# Jobs:
#   1. Code Quality (lint, type check)
#   2. Unit Tests (production modules)
#   3. Docker Build (multi-stage)
#   4. Integration Tests (API endpoints)
#   5. Security Scan (dependencies, secrets)
#   6. Performance Tests (load testing)
#
# Phase: 12
# Version: 1.0.0

name: AMOS Production Stack CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'amos_fastapi_gateway.py'
      - 'amos_production_runtime.py'
      - 'amos_self_healing_controller.py'
      - 'amos_bootstrap_orchestrator.py'
      - 'amos_brain_health_monitor.py'
      - 'Dockerfile.fastapi'
      - 'docker-compose.production-runtime.yml'
      - 'tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'amos_fastapi_gateway.py'
      - 'amos_production_runtime.py'
      - 'Dockerfile.fastapi'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sundays

env:
  PYTHON_VERSION: '3.12'
  REGISTRY: ghcr.io
  IMAGE_NAME: amos-fastapi-gateway

jobs:
  # ============================================
  # Job 1: Code Quality
  # ============================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          pip install ruff mypy black isort

      - name: Run Ruff (linting)
        run: |
          ruff check amos_fastapi_gateway.py amos_production_runtime.py \
            amos_self_healing_controller.py amos_bootstrap_orchestrator.py \
            amos_brain_health_monitor.py

      - name: Run Black (formatting check)
        run: |
          black --check amos_fastapi_gateway.py amos_production_runtime.py

      - name: Run isort (import sorting check)
        run: |
          isort --check-only amos_fastapi_gateway.py amos_production_runtime.py

      - name: Run MyPy (type checking)
        run: |
          mypy amos_fastapi_gateway.py amos_production_runtime.py --ignore-missing-imports

  # ============================================
  # Job 2: Unit Tests
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov httpx
          pip install fastapi uvicorn pydantic

      - name: Run unit tests
        run: |
          pytest tests/unit/test_production_stack.py -v --cov=amos_production_runtime \
            --cov=amos_fastapi_gateway --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ============================================
  # Job 3: Docker Build
  # ============================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.fastapi
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ============================================
  # Job 4: Integration Tests
  # ============================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Compose
        run: |
          docker-compose --version

      - name: Start services
        run: |
          docker-compose -f docker-compose.production-runtime.yml up -d
          sleep 30  # Wait for services to be ready

      - name: Health check
        run: |
          curl -f http://localhost:8000/health || exit 1

      - name: Test API endpoints
        run: |
          # Test root endpoint
          curl -f http://localhost:8000/ || exit 1

          # Test health endpoint
          curl -f http://localhost:8000/health || exit 1

          # Test status endpoint
          curl -f http://localhost:8000/status || exit 1

          # Test equations list
          curl -f http://localhost:8000/equations || exit 1

          echo "All API endpoints working!"

      - name: Run integration test suite
        run: |
          pip install pytest pytest-asyncio httpx
          pytest tests/integration/test_api_gateway.py -v

      - name: Cleanup
        if: always()
        run: |
          docker-compose -f docker-compose.production-runtime.yml down -v

  # ============================================
  # Job 5: Security Scan
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Bandit (Python security linter)
        run: |
          pip install bandit
          bandit -r amos_fastapi_gateway.py amos_production_runtime.py -f json -o bandit-report.json

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ============================================
  # Job 6: Performance Tests
  # ============================================
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker-compose -f docker-compose.production-runtime.yml up -d
          sleep 30

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run load tests
        run: |
          cat > load-test.js << 'EOF'
          import http from 'k6/http';
          import { check } from 'k6';

          export const options = {
            stages: [
              { duration: '30s', target: 10 },
              { duration: '1m', target: 50 },
              { duration: '30s', target: 0 },
            ],
          };

          export default function () {
            const res = http.get('http://localhost:8000/health');
            check(res, {
              'status is 200': (r) => r.status === 200,
              'response time < 500ms': (r) => r.timings.duration < 500,
            });
          }
          EOF
          k6 run load-test.js

      - name: Cleanup
        if: always()
        run: |
          docker-compose -f docker-compose.production-runtime.yml down -v

  # ============================================
  # Job 7: Deploy (if on main branch)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [integration-tests, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add actual deployment commands here
          # e.g., SSH to server and run docker-compose pull && docker-compose up -d

      - name: Verify deployment
        run: |
          # Wait for deployment to be ready
          sleep 30
          curl -f https://staging.amos.example.com/health || exit 1

  # ============================================
  # Summary
  # ============================================
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, docker-build, integration-tests, security-scan]
    if: always()

    steps:
      - name: Pipeline Summary
        run: |
          echo "=========================================="
          echo "  AMOS Production Stack CI/CD Summary"
          echo "=========================================="
          echo "Code Quality:     ${{ needs.code-quality.result }}"
          echo "Unit Tests:       ${{ needs.unit-tests.result }}"
          echo "Docker Build:     ${{ needs.docker-build.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Security Scan:    ${{ needs.security-scan.result }}"
          echo "=========================================="
