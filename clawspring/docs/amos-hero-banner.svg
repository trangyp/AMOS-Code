<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#6366f1" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#6366f1" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#6366f1" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#6366f1" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="#6366f1" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke="#6366f1" stroke-width="1"/>
  </g>

  <!-- Left side: Brain icon -->
  <g transform="translate(180, 200) scale(1.2)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="url(#accentGradient)" stroke-width="3" opacity="0.6"/>
    <circle cx="0" cy="0" r="85" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.4"/>

    <!-- Brain shape -->
    <path d="M0 -55
             C20 -55, 40 -45, 45 -25
             C50 -5, 45 15, 30 25
             C25 30, 15 35, 0 35
             C-15 35, -25 30, -30 25
             C-45 15, -50 -5, -45 -25
             C-40 -45, -20 -55, 0 -55Z"
          fill="url(#brainGradient)"
          filter="url(#glow)"/>

    <!-- Neural nodes -->
    <circle cx="-15" cy="-25" r="5" fill="#ffffff" opacity="0.9"/>
    <circle cx="15" cy="-25" r="5" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="-5" r="6" fill="#ffffff" opacity="0.9"/>
    <circle cx="-15" cy="10" r="4" fill="#ffffff" opacity="0.9"/>
    <circle cx="15" cy="10" r="4" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="20" r="3" fill="#ffffff" opacity="0.9"/>

    <!-- Neural connections -->
    <line x1="-15" y1="-25" x2="0" y2="-5" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <line x1="15" y1="-25" x2="0" y2="-5" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-15" y1="10" x2="0" y2="-5" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <line x1="15" y1="10" x2="0" y2="-5" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-15" y1="10" x2="0" y2="20" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
    <line x1="15" y1="10" x2="0" y2="20" stroke="#ffffff" stroke-width="1" opacity="0.5"/>

    <!-- Level indicators -->
    <circle cx="0" cy="-65" r="3" fill="#fbbf24"/>
    <circle cx="30" cy="-55" r="3" fill="#f59e0b"/>
    <circle cx="45" cy="-30" r="3" fill="#ef4444"/>
    <circle cx="45" cy="0" r="3" fill="#ec4899"/>
    <circle cx="30" cy="30" r="3" fill="#8b5cf6"/>
    <circle cx="0" cy="45" r="3" fill="#3b82f6"/>
  </g>

  <!-- Right side: Text -->
  <g transform="translate(450, 130)">
    <!-- AMOS Title -->
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="800" fill="#ffffff" filter="url(#textGlow)">AMOS</text>

    <!-- Subtitle -->
    <text x="0" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="300" fill="#94a3b8" letter-spacing="8">BRAIN</text>

    <!-- Full name -->
    <text x="0" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#64748b">Absolute Meta Operating System</text>

    <!-- Decorative line -->
    <line x1="0" y1="100" x2="400" y2="100" stroke="url(#accentGradient)" stroke-width="2" opacity="0.8"/>

    <!-- Tagline -->
    <text x="0" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="400" fill="#94a3b8">Unified Cognitive Architecture for AI Agents</text>
  </g>

  <!-- Bottom: Feature pills -->
  <g transform="translate(450, 320)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#3b82f6" opacity="0.2"/>
    <text x="40" y="19" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#60a5fa" text-anchor="middle">Rule of 2</text>

    <rect x="90" y="0" width="80" height="28" rx="14" fill="#8b5cf6" opacity="0.2"/>
    <text x="130" y="19" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#a78bfa" text-anchor="middle">Rule of 4</text>

    <rect x="180" y="0" width="80" height="28" rx="14" fill="#ec4899" opacity="0.2"/>
    <text x="220" y="19" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#f472b6" text-anchor="middle">6 Laws</text>

    <rect x="270" y="0" width="100" height="28" rx="14" fill="#10b981" opacity="0.2"/>
    <text x="320" y="19" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#34d399" text-anchor="middle">Multi-Agent</text>
  </g>

  <!-- Corner accents -->
  <circle cx="50" cy="50" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="1150" cy="50" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="50" cy="350" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="1150" cy="350" r="3" fill="#6366f1" opacity="0.5"/>
</svg>
